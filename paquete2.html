<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(#fff0f5,#ffe4ec);
    text-align:center;
}

h1{
    font-family:'Pacifico';
    color:#7a2e2e;
}

/* TARJETA */
.card{
    background:white;
    margin:20px auto;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* IMAGEN PRINCIPAL */
.main-img{
    width:85%;
    border-radius:20px;
    margin:10px auto;
    display:block;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* MINIATURAS */
.thumbnails{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.thumbnails img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    opacity:0.7;
    transition:0.3s;
}

.thumbnails img:hover{
    opacity:1;
    transform:scale(1.1);
}

/* LISTA */
ul{
    text-align:left;
    margin-top:15px;
}

/* BOTON */
a{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:white;
    background:#ff4d88;
    padding:10px 20px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>PAQUETE 2</h1>

<div class="card">

<!-- IMAGEN GRANDE -->
<img id="imagenPrincipal" src="figura2.jpg" class="main-img">

<!-- MINIATURAS -->
<div class="thumbnails">
    <img src="figura2.jpg" onclick="cambiarImagen(this)">
    <img src="figura34.jpeg" onclick="cambiarImagen(this)">

</div>

<ul>
<li>Waffles (lechera o miel)</li>
<li>Gelatina</li>
<li>Mini pastel</li>
<li>Cuernito (jamón, queso, lechuga, jitomate, cebolla, mayonesa)</li>
<li>Fruta (granola y miel)</li>
<li>Café</li>
<li>Yogurt bebible</li>
<li>Jugo</li>
<li>Galletas</li>
<li>Bolsa de papas</li>
<li>Yogurt Oikos</li>
</ul>

</div>

<a href="index.html">⬅ Volver</a>

<script>
function cambiarImagen(img){
    document.getElementById("imagenPrincipal").src = img.src;
}
</script>

</body>
</html>
