<!DOCTYPE html>

<title>Desayunos</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(#fff0f5,#ffe4ec);
    text-align:center;
}

h1{
    font-family:'Pacifico', cursive;
    font-size:50px;
    color:#7a2e2e;
}

/* MENSAJE */
.anuncio{
    background:#ff4d88;
    color:white;
    padding:20px;
    margin:20px auto;
    border-radius:20px;
    width:90%;
    max-width:600px;
    line-height:1.6;
    font-style:italic;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* CONTENEDOR */
.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:20px;
}

/* TARJETAS */
.card{
    width:280px;
    background:white;
    border-radius:20px;
    padding:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-decoration:none;
    color:black;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

/* IMÁGENES */
.card img{
    width:90%;
    height:180px;
    object-fit:cover;
    margin:10px auto;
    display:block;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* TITULO */
.titulo{
    background:#ff4d88;
    color:white;
    padding:10px;
    font-weight:bold;
    border-radius:10px;
    margin-top:10px;
}

/* BOTÓN WHATSAPP ABAJO */
.whatsapp{
    display:block;
    margin:40px auto;
    width:fit-content;
    background:#25D366;
    color:white;
    padding:15px 25px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.whatsapp:hover{
    transform:scale(1.1);
    background:#1ebe5d;
}
</style>
</head>

<body>

<h1>💖 Desayunos para Mamá 💖</h1>

🎁 ¡Entrega especial para esa persona importante!
</div>
